<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Инженерный калькулятор теплотехника</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: #fff;
}

.tabs {
    display: flex;
    background: #1e293b;
}

.tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    border-bottom: 2px solid transparent;
}

.tab.active {
    border-bottom: 2px solid #38bdf8;
    background: #0f172a;
}

.container {
    padding: 16px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: #000;
    margin-top: 10px;
}

.result {
    background: #1e293b;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
}

.warning {
    color: #f87171;
    font-weight: bold;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="tabs">
    <div class="tab active" onclick="switchTab('main')">Магистраль</div>
    <div class="tab" onclick="switchTab('floor')">Теплый пол</div>
    <div class="tab" onclick="switchTab('loss')">Теплопотери</div>
</div>

<div class="container">

<!-- Магистраль -->
<div id="main" class="tabContent">
    <h3>Магистраль</h3>

    <input id="Q" type="number" placeholder="Тепловая нагрузка (Вт)">
    <input id="dT" type="number" placeholder="ΔT (°C)">

    <select id="pipe">
        <option value="12">PEX 16</option>
        <option value="16">PEX 20</option>
        <option value="20">PPR 25</option>
        <option value="26">PPR 32</option>
    </select>

    <button onclick="calcMain()">Рассчитать</button>

    <div class="result" id="mainResult"></div>
</div>

<!-- Теплый пол -->
<div id="floor" class="tabContent hidden">
    <h3>Теплый пол</h3>

    <input id="area" type="number" placeholder="Площадь (м²)">

    <select id="step">
        <option value="0.1">100 мм</option>
        <option value="0.15">150 мм</option>
        <option value="0.2">200 мм</option>
    </select>

    <button onclick="calcFloor()">Рассчитать</button>

    <div class="result" id="floorResult"></div>
</div>

<!-- Теплопотери -->
<div id="loss" class="tabContent hidden">
    <h3>Теплопотери</h3>

    <input id="areaLoss" type="number" placeholder="Площадь (м²)">
    <input id="height" type="number" placeholder="Высота потолка (м)">

    <select id="insulation">
        <option value="0.7">Хорошее утепление</option>
        <option value="1.0">Среднее</option>
        <option value="1.4">Плохое</option>
    </select>

    <button onclick="calcLoss()">Рассчитать</button>

    <div class="result" id="lossResult"></div>
</div>

<button onclick="window.print()">Печать / PDF</button>

</div>

<script>

// ===== ТАБЫ =====
function switchTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tabContent').forEach(c => c.classList.add('hidden'));

    document.getElementById(tabId).classList.remove('hidden');
    event.target.classList.add('active');
}

// ===== LOCAL STORAGE =====
document.querySelectorAll('input, select').forEach(el => {
    el.value = localStorage.getItem(el.id) || "";

    el.addEventListener('input', () => {
        localStorage.setItem(el.id, el.value);
    });
});

// ===== МАГИСТРАЛЬ =====
function calcMain() {
    let Q = +document.getElementById('Q').value;
    let dT = +document.getElementById('dT').value;
    let d = +document.getElementById('pipe').value / 1000;

    if (!Q || !dT) return;

    let G = Q / (1.163 * dT); // л/ч
    let Gm3 = G / 1000; // м3/ч

    let area = Math.PI * Math.pow(d/2, 2);
    let velocity = (Gm3 / 3600) / area;

    let warning = "";
    if (velocity > 0.7) warning = "⚠️ Шумно";
    if (velocity < 0.2) warning = "⚠️ Застой воздуха";

    document.getElementById('mainResult').
innerHTML = `
        Расход: <b>${G.toFixed(1)} л/ч</b><br>
        Скорость: <b>${velocity.toFixed(2)} м/с</b><br>
        <span class="warning">${warning}</span>
    `;
}

// ===== ТЕПЛЫЙ ПОЛ =====
function calcFloor() {
    let area = +document.getElementById('area').value;
    let step = +document.getElementById('step').value;

    if (!area) return;

    let length = (area / step) * 1.1;

    let warning = "";
    if (length > 100) warning = "⚠️ Разделить контур";

    document.getElementById('floorResult').innerHTML = `
        Длина петли: <b>${length.toFixed(1)} м</b><br>
        <span class="warning">${warning}</span>
    `;
}

// ===== ТЕПЛОПОТЕРИ =====
function calcLoss() {
    let area = +document.getElementById('areaLoss').value;
    let height = +document.getElementById('height').value;
    let k = +document.getElementById('insulation').value;

    if (!area || !height) return;

    let volume = area * height;
    let Q = volume * k * 40;

    document.getElementById('lossResult').innerHTML = `
        Теплопотери: <b>${Q.toFixed(0)} Вт</b>
    `;
}

</script>

</body>
</html>
