<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Engineer PRO 25.0</title>
<style>
body{font-family:sans-serif;background:#eef2f7;padding:10px}
.wrap{max-width:1100px;margin:auto}
.box{background:#fff;padding:12px;margin-top:10px;border-radius:10px}
input,select,button{width:100%;padding:8px;margin-top:6px}
button{background:#2563eb;color:#fff;border:none}
canvas{background:#fff;border:1px solid #ccc;margin-top:10px}
.report{background:#fff;padding:20px;margin-top:10px;display:none}
@media print{body *{visibility:hidden}.report{visibility:visible;display:block}}
.warn{color:red;font-size:12px}
</style>
</head>
<body>
<div class="wrap">

<div class="box">
<h3>ОБЪЕКТ</h3>
<input id="dt" value="20">
<select id="fluid">
<option value="1">Вода</option>
<option value="0.85">Антифриз 30%</option>
<option value="0.7">Антифриз 50%</option>
</select>
<button onclick="addRoom()">+ КОМНАТА</button>
</div>

<div id="rooms"></div>

<div class="box">
<button onclick="calc()">ПОЛНЫЙ РАСЧЁТ</button>
<button onclick="makeReport()">ОТЧЁТ</button>
<button onclick="window.print()">PDF</button>
<div id="out"></div>
</div>

<canvas id="cv" width="900" height="400"></canvas>
<div id="rep" class="report"></div>

</div>

<script>
let rooms=[];

function addRoom(){
let id=Date.now();
rooms.push({id});
render();
}

function render(){
let h='';
rooms.forEach((r,i)=>{
h+=`
<div class="box">
<b>Комната ${i+1}</b>
<input id="s_${r.id}" value="20" placeholder="м²">
<input id="l_${r.id}" value="15" placeholder="длина трубы">
<select id="rad_${r.id}">
<option value="180">Алюм 180Вт</option>
<option value="120">Сталь 120Вт</option>
</select>
</div>
`;
});
roomsDiv.innerHTML=h;
}

const D=[0.013,0.016,0.020,0.025,0.032];

let results=[];
let maxH=0;

function calc(){

results=[];
maxH=0;

let fluid=+fluid.value;
let cp=4.187*fluid;
let nu=0.0000006/fluid;

rooms.forEach((r,i)=>{

let S=+document.getElementById("s_"+r.id).value;
let len=+document.getElementById("l_"+r.id).value;
let rad=+document.getElementById("rad_"+r.id).value;

let heat=S*100;
let sections=Math.ceil(heat/rad);
let Q=heat/(1000*cp*dt.value);

let best=null;

D.forEach(d=>{
let v=(Q)/(Math.PI*d*d/4);
let Re=v*d/nu;
let lambda=0.11*Math.pow((0.000007/d+68/Re),0.25);
let h=lambda*(len/d)*(v*v/19.62);
if(v>0.3&&v<1.2){if(!best||h<best.h){best={d,v,h,Q,sections,len,heat}}}
});

if(!best){best={d:0.02,v:0.7,h:1,Q,sections,len,heat}}

maxH=Math.max(maxH,best.h);
results.push(best);

});

let pump=[{n:"25-40",h:4},{n:"25-60",h:6},{n:"25-80",h:8}]
.find(p=>p.h>=maxH*1.25)||{n:">8м"};

let txt="";
results.forEach((r,i)=>{
let dH=maxH-r.h;
let Kv=(r.Q*3.6)/Math.sqrt(dH||0.1);

let warn="";
if(r.v>1.5)warn+="⚠️ шум ";
if(r.v<0.2)warn+="⚠️ воздух ";

txt+=`Комната ${i+1}: d ${(r.d*1000).toFixed(0)}мм | v ${r.v.toFixed(2)} | h ${r.h.toFixed(2)} | Kv ${Kv.toFixed(2)} ${warn}<br>`;
});

out.innerHTML=txt+"<b>Насос: "+pump.n+"</b>";

draw();
}

function draw(){
let c=cv.getContext("2d");
c.clearRect(0,0,900,400);

results.forEach((r,i)=>{
let x=50;
let y=50+i*60;
let len=r.h*60;

c.beginPath();
c.moveTo(x,y);
c.lineTo(x+len,y);
c.stroke();

c.fillText("К"+(i+1),x-30,y+5);
});
}

function makeReport(){

let txt="<h2>ИНЖЕНЕРНЫЙ ОТЧЁТ</h2>";
let totalPipe=0,totalRad=0;

results.forEach((r,i)=>{
totalPipe+=r.len;
totalRad+=r.sections;

txt+=`
<b>Комната ${i+1}</b><br>
Мощность ${(r.heat/1000).toFixed(2)} кВт<br>
Радиаторы: ${r.sections} секций<br>
Диаметр ${(r.d*1000).toFixed(0)} мм<br><br>
`;
});

txt+=`
<hr>
<b>СПЕЦИФИКАЦИЯ</b><br>
Труба: ${totalPipe} м<br>
Радиаторы: ${totalRad} секций<br>
`;

rep.innerHTML=txt;
rep.style.display="block";
}

addRoom();
</script>
</body>
</html>
