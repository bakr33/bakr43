<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineer PRO 35.5 | ГИДРАВЛИКА & ПОЛ</title>
    <style>
        :root { --blue:#2563eb; --red:#ef4444; --bg:#f1f5f9; --text:#1e293b; --green:#10b981; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .nav { display: flex; justify-content: center; gap: 10px; padding: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; background: #e2e8f0; color: #64748b; }
        .nav-btn.active { background: var(--blue); color: #fff; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; width: 100%; box-sizing: border-box; font-size: 15px; }
        .btn-main { background: var(--blue); color: #fff; padding: 15px; border: none; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .res-block { background: #f8fafc; border-left: 5px solid var(--blue); padding: 15px; margin-top: 20px; border-radius: 8px; }
        .warn { color: var(--red); font-weight: bold; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="nav">
    <button class="nav-btn active" onclick="showTab('hydro')">💧 ГИДРАВЛИКА</button>
    <button class="nav-btn" onclick="showTab('floor')">🌀 ТЕПЛЫЙ ПОЛ</button>
    <button class="nav-btn" onclick="showTab('heat')">🔥 ТЕПЛО</button>
</div>

<div class="container">
    <!-- ВКЛАДКА ГИДРАВЛИКА -->
    <div id="tab_hydro" class="card">
        <h3>Расчет участка магистрали</h3>
        <div class="grid">
            <div><label>Труба</label>
                <select id="h_pipe">
                    <option value="12">PEX 16 (внутр. 12мм)</option>
                    <option value="16">PEX 20 (внутр. 16мм)</option>
                    <option value="20">PPR 25 (внутр. 20.4мм)</option>
                    <option value="26">PPR 32 (внутр. 26мм)</option>
                </select>
            </div>
            <div><label>Мощность (кВт)</label><input id="h_pow" type="number" value="5"></div>
            <div><label>ΔT (°C)</label><input id="h_dt" type="number" value="20"></div>
            <div><label>Длина участка (м)</label><input id="h_len" type="number" value="10"></div>
        </div>
        <button class="btn-main" onclick="calcHydro()">АНАЛИЗ УЧАСТКА</button>
        <div id="res_hydro" class="res-block" style="display:none"></div>
    </div>

    <!-- ВКЛАДКА ТЕПЛЫЙ ПОЛ -->
    <div id="tab_floor" class="card" style="display:none">
        <h3>Параметры контура ТП</h3>
        <div class="grid">
            <div><label>Площадь (м²)</label><input id="f_s" type="number" value="15"></div>
            <div><label>Шаг укладки (мм)</label>
                <select id="f_step">
                    <option value="100">100 мм</option>
                    <option value="150" selected>150 мм</option>
                    <option value="200">200 мм</option>
                </select>
            </div>
        </div>
        <button class="btn-main" onclick="calcFloor()">РАСЧИТАТЬ ПЕТЛЮ</button>
        <div id="res_floor" class="res-block" style="display:none"></div>
    </div>
</div>

<script>
function showTab(tab) {
    document.getElementById('tab_hydro').style.display = tab === 'hydro' ? 'block' : 'none';
    document.getElementById('tab_floor').style.display = tab === 'floor' ? 'block' : 'none';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.
remove('active'));
    event.currentTarget.classList.add('active');
}

function calcHydro() {
    const d = +document.getElementById('h_pipe').value / 1000;
    const p = +document.getElementById('h_pow').value * 1000;
    const dt = +document.getElementById('h_dt').value;
    const len = +document.getElementById('h_len').value;

    const flow = p / (1.163 * dt); // л/ч
    const flowM3 = flow / 1000; // м3/ч
    const velocity = (flowM3 / 3600) / (Math.PI * Math.pow(d, 2) / 4);
    
    // Потери давления (упрощенно Па)
    const resistance = (0.02 * (len/d) * (Math.pow(velocity, 2) * 1000 / 2)).toFixed(0);

    let html = `<b>Расход:</b> ${flow.toFixed(1)} л/ч<br>
                <b>Скорость:</b> ${velocity.toFixed(2)} м/с<br>
                <b>Потери давления:</b> ${(resistance/1000).toFixed(2)} кПа`;
    
    if(velocity > 0.7) html += <div class="warn">⚠️ Слишком высокая скорость! Увеличьте диаметр.</div>;
    if(velocity < 0.2) html += <div class="warn">⚠️ Застой (воздух не выйдет). Уменьшите диаметр.</div>;

    document.getElementById('res_hydro').innerHTML = html;
    document.getElementById('res_hydro').style.display = 'block';
}

function calcFloor() {
    const s = +document.getElementById('f_s').value;
    const step = +document.getElementById('f_step').value / 1000;
    const pipeLen = (s / step) * 1.1; // +10% на повороты и подводку

    let html = `<b>Длина трубы:</b> ${pipeLen.toFixed(1)} м.п.<br>
                <b>Объем воды:</b> ${(pipeLen * 0.113).toFixed(1)} л (для 16-й трубы)`;
    
    if(pipeLen > 100) html += <div class="warn">⚠️ Петля больше 100м! Разделите на два контура.</div>;

    document.getElementById('res_floor').innerHTML = html;
    document.getElementById('res_floor').style.display = 'block';
}
</script>
</body>
</html>
