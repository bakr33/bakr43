<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineer PRO 35.1 | Расчет системы</title>
    <style>
        :root { --blue:#2563eb; --red:#ef4444; --bg:#f8fafc; --text:#1e293b; --green:#059669; --slate:#64748b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin:0; padding:15px; }
        .container { max-width:900px; margin:auto; }
        .module { background:#fff; padding:20px; border-radius:12px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:15px; }
        label { font-size: 11px; color: var(--slate); text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 5px; }
        input, select { padding:10px; border-radius:8px; border:1px solid #cbd5e1; width:100%; box-sizing: border-box; font-size: 14px; background: #fdfdfd; }
        button { padding:14px; border:none; border-radius:10px; color:#fff; font-weight:bold; cursor:pointer; transition: 0.2s; width: 100%; }
        .btn-add { background: var(--blue); margin-bottom: 10px; }
        .btn-calc { background: var(--green); font-size: 16px; margin-top: 10px; }
        .room-card { border-left: 6px solid var(--blue); position: relative; }
        .spec-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .spec-table td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .spec-table td:last-child { text-align: right; font-weight: bold; }
        .pump-res { background: #ecfdf5; border: 1px solid #10b981; padding: 15px; border-radius: 10px; margin-top: 15px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
<div class="container">
    <div class="module no-print">
        <h2 style="margin-top:0">⚙️ ПАРАМЕТРЫ СИСТЕМЫ</h2>
        <div class="grid">
            <div><label>Теплоноситель</label>
                <select id="sys_fluid">
                    <option value="1">Вода (чистая)</option>
                    <option value="0.85">Пропиленгликоль 30%</option>
                </select>
            </div>
            <div><label>ΔT (Разность температур, °C)</label><input id="sys_dt" type="number" value="20"></div>
            <div><label>Материал труб</label>
                <select id="sys_tube">
                    <option value="0.007">Пластик (PEX/PN20)</option>
                    <option value="0.0015">Металл (Медь/Нерж)</option>
                </select>
            </div>
        </div>
    </div>

    <div id="rooms_container" class="no-print"></div>
    
    <div class="no-print">
        <button class="btn-add" onclick="addRoom()">+ ДОБАВИТЬ ПОМЕЩЕНИЕ / ВЕТКУ</button>
        <button class="btn-calc" onclick="calculate()">ВЫПОЛНИТЬ ПОЛНЫЙ АНАЛИЗ</button>
    </div>

    <div id="results_module" class="module" style="display:none">
        <h2 style="margin-top:0">📊 РЕЗУЛЬТАТЫ РАСЧЕТА</h2>
        <div id="out_text"></div>
        <div class="pump-res" id="pump_out"></div>
        
        <h3>📋 СПЕЦИФИКАЦИЯ</h3>
        <table class="spec-table" id="spec_table"></table>
        
        <button class="btn-add no-print" style="background:#475569; margin-top:20px" onclick="window.print()">СОХРАНИТЬ В PDF / ПЕЧАТЬ</button>
    </div>
</div>

<script>
let rooms = [];
const PUMPS = [
    { n: "Grundfos UPS 25-40", h: 4 },
    { n: "Grundfos UPS 25-60", h: 6 },
    { n: "Grundfos UPS 25-80", h: 8 }
];

function addRoom() {
    const id = Date.now();
    rooms.push({ id });
    const div = document.createElement('div');
    div.className = 'module room-card';
    div.innerHTML = `
        <b>ОБЪЕКТ №${rooms.length}</b>
        <div class="grid" style="margin-top:10px">
            <div><label>Площадь (м²)</label><input id="s_${id}" type="number" value="15"></div>
            <div><label>Тип стен</label>
                <select id="wall_${id}">
<option value="0.7">Утеплен</option>
                    <option value="1.0" selected>Стандарт</option>
                    <option value="1.4">Холодный (кирпич)</option>
                </select>
            </div>
            <div><label>Длина магистрали (м)</label><input id="l_${id}" type="number" value="15"></div>
        </div>`;
    document.getElementById('rooms_container').appendChild(div);
}

function calculate() {
    if(rooms.length === 0) return alert("Добавьте хотя бы одно помещение");
    
    const dt = +document.getElementById('sys_dt').value;
    const fC = +document.getElementById('sys_fluid').value;
    const cp = 4.187 * fC; // Теплоемкость
    
    let totalHeat = 0;
    let totalPipe = 0;
    let maxResistance = 0;

    rooms.forEach(r => {
        const s = +document.getElementById(`s_${r.id}`).value;
        const k = +document.getElementById(`wall_${r.id}`).value;
        const len = +document.getElementById(`l_${r.id}`).value;
        
        const heat = s * 100 * k;
        totalHeat += heat;
        totalPipe += len * 2; // Туда-обратно
        
        // Грубый расчет сопротивления (Па)
        const flow = (heat / (cp * dt)) / 1000; 
        const res = len * 2 * 250; // 250 Па/м среднее
        if(res > maxResistance) maxResistance = res;
    });

    const totalFlow = (totalHeat / (cp * dt)) / 1000 * 3600; // м3/ч
    const headRequired = (maxResistance * 1.3) / 10000; // в метры водяного столба

    // Подбор насоса
    let bestPump = PUMPS.find(p => p.h >= headRequired) || PUMPS[2];

    document.getElementById('results_module').style.display = 'block';
    document.getElementById('out_text').innerHTML = `
        <div style="font-size: 18px; margin-bottom: 10px;">
            <b>Суммарная тепловая нагрузка:</b> ${(totalHeat/1000).toFixed(2)} кВт<br>
            <b>Общий расход теплоносителя:</b> ${totalFlow.toFixed(3)} м³/ч
        </div>`;
    
    document.getElementById('pump_out').innerHTML = `
        <b>РЕКОМЕНДУЕМЫЙ НАСОС:</b> ${bestPump.n}<br>
        <small>Требуемый напор: ${headRequired.toFixed(2)} м.в.с. при макс. ветке.</small>`;

    document.getElementById('spec_table').innerHTML = `
        <tr><td>Труба магистральная (ориентир)</td><td>${totalPipe} м.п.</td></tr>
        <tr><td>Радиаторы (секций 500мм)</td><td>~${Math.ceil(totalHeat/180)} шт.</td></tr>
        <tr><td>Объем системы (примерный)</td><td>~${(totalPipe * 0.15 + totalHeat/100).toFixed(1)} л.</td></tr>
    `;
    
    window.scrollTo(0, document.getElementById('results_module').offsetTop);
}

addRoom();
</script>
</body>
</html>
